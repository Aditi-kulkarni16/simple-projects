<!DOCTYPE html>
<html>
<head>
<title>To Do List</title>

<style>

body{
  font-family: Arial;
  background: linear-gradient(to right, #74ebd5, #9face6);
  text-align: center;
  padding-top: 80px;
}

.todo-container{
  background: white;
  width: 350px;
  margin: auto;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}

h2{
  margin-bottom: 20px;
}

input{
  padding: 10px;
  width: 65%;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button{
  padding: 10px 15px;
  border: none;
  background: #4CAF50;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover{
  background: #45a049;
}

ul{
  padding: 0;
  margin-top: 20px;
}

li{
  list-style: none;
  background: #f1f1f1;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
}

.completed{
  text-decoration: line-through;
  color: gray;
}

.delete-btn{
  background: red;
  padding: 5px 8px;
  font-size: 12px;
}

</style>

</head>

<body>

<div class="todo-container">

<h2>My To-Do List</h2>

<input type="text" id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let input = document.getElementById("taskInput");
let task = input.value;

if(task === "") return;

let li = document.createElement("li");

li.innerHTML = task + " <button class='delete-btn' onclick='deleteTask(this)'>X</button>";

li.onclick = function(){
this.classList.toggle("completed");
};

document.getElementById("taskList").appendChild(li);

input.value="";

}

function deleteTask(btn){
btn.parentElement.remove();
}

</script>

</body>
</html>
